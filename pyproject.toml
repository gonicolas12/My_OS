# Configuration des outils de qualité de code.
#
# Le linter officiel du projet est ruff (cf. CLAUDE.md). La section pylint
# ci-dessous ne sert qu'à neutraliser des faux positifs liés à l'environnement
# de développement (Windows, dépendances Linux non installées) et aux
# contraintes de frameworks (surcharges Qt en camelCase). Elle ne désactive
# aucun contrôle utile à la détection de vrais bugs.

[tool.pylint.main]
# Dépendances tierces / spécifiques Linux non résolues hors machine cible.
ignored-modules = [
    "pynput",
    "pynput.keyboard",
    "PySide6",
    "PySide6.QtCore",
    "PySide6.QtGui",
    "PySide6.QtWidgets",
]

[tool.pylint.typecheck]
# Membres de la stdlib disponibles sous Linux mais absents sous Windows.
generated-members = ["os.getuid", "socket.AF_UNIX"]

[tool.pylint.basic]
# Autorise snake_case ET camelCase pour les méthodes (surcharges Qt :
# keyPressEvent, closeEvent, ...) tout en interdisant les autres styles.
method-rgx = "[a-z_][a-zA-Z0-9_]{2,}$"

[tool.pylint.messages_control]
disable = [
    "import-outside-toplevel", # import paresseux volontaire (pynput sans serveur X)
    "too-few-public-methods",  # dataclasses et petites classes intentionnelles
]
